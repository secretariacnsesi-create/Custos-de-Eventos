<script>
// =========================================================
// 🚀 CN-SESI GEMINI EDITION — CORE SYSTEM
// =========================================================

// =========================================================
// 1. CONFIGURAÇÕES GLOBAIS
// =========================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwAckIZVCXCFiryql-BYu1xabX9zlXybIx6x59CGGmc9C4_zn8ouIjsIuIKK1aBGXOL-w/exec";

const GEMINI_API_KEY = "AIzaSyBpd8uxPnEdjc1073sYHBDwlV8fW1HubME";

let db = [];
let ddChartInst = null;
let dashChartAnoInst = null;
let dashChartCatInst = null;
let debounceTimer = null;
window.iaBuffer = null;

// =========================================================
// 2. UTILITÁRIOS
// =========================================================
const fmt = (v) =>
    Number(v).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    });

// =========================================================
// 3. TOASTS
// =========================================================
function showToast(msg, type = 'info', duration = 3500) {

    const icons = {
        success: '✅',
        error: '❌',
        info: 'ℹ️',
        warning: '⚠️'
    };

    const el = document.createElement('div');

    el.className = `toast ${type}`;

    el.innerHTML = `
        <span>${icons[type]}</span>
        ${msg}
    `;

    document
        .getElementById('toast-container')
        .appendChild(el);

    setTimeout(() => {

        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        el.style.transition = '0.3s';

        setTimeout(() => el.remove(), 300);

    }, duration);
}

// =========================================================
// 4. LOADER
// =========================================================
function showLoader(msg = 'Sincronizando com a Nuvem...') {

    document.getElementById('loaderMsg').innerText = msg;

    document
        .getElementById('loader')
        .classList.remove('hidden');
}

function hideLoader() {

    document
        .getElementById('loader')
        .classList.add('hidden');
}

// =========================================================
// 5. MENU MOBILE
// =========================================================
function toggleSidebar() {

    document
        .getElementById('sidebar')
        .classList.toggle('open');

    document
        .getElementById('sidebarOverlay')
        .classList.toggle('open');
}

// =========================================================
// 6. SINCRONIZAÇÃO COM GOOGLE SHEETS
// =========================================================
async function sincronizarBD() {

    showLoader('Sincronizando com a Nuvem...');

    const syncIcon = document.getElementById('syncIcon');

    if(syncIcon) syncIcon.innerText = '⏳';

    try {

        const res = await fetch(API_URL + "?action=ler");

        if(!res.ok) {
            throw new Error("Erro HTTP " + res.status);
        }

        const data = await res.json();

        db = data.map(item => ({

            id: item.id,

            ano: item.ano,

            evento: item.evento,

            conselheiro: item.conselheiro,

            pass: Number(item.pass) || 0,

            diar: Number(item.diar) || 0,

            hosp: Number(item.hosp) || 0,

            alim: Number(item.alim) || 0
        }));

        atualizarTudo();

        showToast(
            `${db.length} registros sincronizados.`,
            'success'
        );

        // STATUS ONLINE
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');

        if(dot) dot.className = 'status-dot';
        if(text) text.textContent = 'Conectado à Nuvem';

    } catch(e) {

        console.error(e);

        showToast(
            "Erro ao sincronizar com a nuvem.",
            'error',
            6000
        );

        // STATUS OFFLINE
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');

        if(dot) dot.className = 'status-dot offline';
        if(text) text.textContent = 'Offline';

    } finally {

        hideLoader();

        if(syncIcon) syncIcon.innerText = '🔄';
    }
}

// =========================================================
// 7. IA GEMINI — LEITURA AUTOMÁTICA
// =========================================================
async function processarComIA() {

    const texto = document
        .getElementById('textoBruto')
        .value
        .trim();

    if(!texto) {

        showToast(
            'Cole o relatório antes.',
            'warning'
        );

        return;
    }

    showLoader('Gemini analisando documento...');

    try {

        const prompt = `
Extraia os dados abaixo do relatório.

Retorne APENAS JSON válido.

Estrutura:

{
  "ano": "",
  "evento": "",
  "conselheiro": "",
  "pass": 0,
  "diar": 0,
  "hosp": 0,
  "alim": 0
}

Texto:
${texto}
`;

        const response = await fetch(

            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY,

            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    contents: [
                        {
                            parts: [
                                { text: prompt }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        if(!data.candidates) {
            throw new Error("Gemini não retornou dados.");
        }

        let jsonText =
            data.candidates[0]
            .content.parts[0]
            .text;

        jsonText = jsonText
            .replace(/```json/g, '')
            .replace(/```/g, '')
            .trim();

        const resultado = JSON.parse(jsonText);

        window.iaBuffer = resultado;

        // Preenche formulário automaticamente
        document.getElementById('regAno').value = resultado.ano || '';
        document.getElementById('regEvento').value = resultado.evento || '';
        document.getElementById('regConselheiro').value = resultado.conselheiro || '';

        document.getElementById('regPassagem').value = resultado.pass || 0;
        document.getElementById('regDiaria').value = resultado.diar || 0;
        document.getElementById('regHospedagem').value = resultado.hosp || 0;
        document.getElementById('regAlimentacao').value = resultado.alim || 0;

        // Resultado bruto
        const pre = document.getElementById('iaResultPre');
        const box = document.getElementById('iaResult');

        if(pre) pre.textContent = JSON.stringify(resultado, null, 2);

        if(box) box.style.display = 'block';

        showToast(
            'Documento processado pela IA com sucesso.',
            'success'
        );

    } catch(e) {

        console.error(e);

        showToast(
            'Erro na IA: ' + e.message,
            'error',
            7000
        );

    } finally {

        hideLoader();
    }
}

// =========================================================
// 8. SALVAR REGISTRO
// =========================================================
async function salvarRegistro(e) {

    e.preventDefault();

    const btn = document.getElementById('btnSalvar');

    btn.disabled = true;

    btn.innerHTML = '⏳ Salvando...';

    try {

        const idStr = document.getElementById("regId").value;

        const r = {

            id: idStr || "",

            ano: document.getElementById("regAno").value,

            evento: document.getElementById("regEvento").value,

            conselheiro: document.getElementById("regConselheiro").value,

            pass: parseFloat(document.getElementById("regPassagem").value) || 0,

            diar: parseFloat(document.getElementById("regDiaria").value) || 0,

            hosp: parseFloat(document.getElementById("regHospedagem").value) || 0,

            alim: parseFloat(document.getElementById("regAlimentacao").value) || 0
        };

        // DETECTOR DE ANOMALIA
        const mediaHistorica =
            db
            .filter(x => x.evento === r.evento)
            .reduce((acc, cur) => acc + cur.diar, 0) /
            Math.max(
                db.filter(x => x.evento === r.evento).length,
                1
            );

        if(r.diar > mediaHistorica * 1.3) {

            showToast(
                '⚠️ Valor de diária acima da média histórica.',
                'warning',
                7000
            );
        }

        const jsonParams =
            encodeURIComponent(JSON.stringify(r));

        const response = await fetch(

            API_URL + `?action=salvar&dados=${jsonParams}`
        );

        await response.json();

        showToast(
            'Registro salvo na nuvem.',
            'success'
        );

        limparForm();

        sincronizarBD();

    } catch(e) {

        console.error(e);

        showToast(
            'Erro ao salvar registro.',
            'error'
        );

    } finally {

        btn.disabled = false;

        btn.innerHTML = '💾 Salvar na Nuvem';
    }
}

// =========================================================
// 9. EXCLUIR
// =========================================================
async function excluirRegistro(id, nome) {

    if(
        !confirm(
            `Excluir "${nome}" definitivamente?`
        )
    ) return;

    showLoader('Excluindo registro...');

    try {

        const response = await fetch(
            API_URL + `?action=excluir&id=${id}`
        );

        await response.json();

        showToast(
            'Registro excluído.',
            'success'
        );

        sincronizarBD();

    } catch(e) {

        showToast(
            'Erro ao excluir.',
            'error'
        );

    } finally {

        hideLoader();
    }
}

// =========================================================
// 10. ATUALIZA INTERFACE
// =========================================================
function atualizarTudo() {

    renderSidebar();

    atualizarDashboardGlobal();

    renderCRUD();

    preencherFiltroAno();

    gerarRelatorio();

    atualizarDatalistEventos();

    const badge = document.getElementById('badgeCount');

    if(badge) {
        badge.innerText = db.length;
    }

    atualizarInsightsIA();
}

// =========================================================
// 11. INSIGHTS INTELIGENTES
// =========================================================
function atualizarInsightsIA() {

    const insightBox =
        document.getElementById('insightIA');

    if(!insightBox || db.length === 0) return;

    const total2024 = db
        .filter(x => x.ano == 2024)
        .reduce((a,b)=>
            a+b.pass+b.diar+b.hosp+b.alim,0);

    const total2025 = db
        .filter(x => x.ano == 2025)
        .reduce((a,b)=>
            a+b.pass+b.diar+b.hosp+b.alim,0);

    if(total2024 > 0) {

        const perc =
            ((total2025-total2024)/total2024)*100;

        insightBox.innerHTML = `
            💡 <strong>Gemini Insight:</strong><br>
            Os gastos de 2025 estão
            <strong>${perc.toFixed(1)}%</strong>
            maiores que 2024.
        `;
    }
}

// =========================================================
// 12. DASHBOARD
// =========================================================
function atualizarDashboardGlobal() {

    let tP=0, tD=0, tH=0, tO=0;

    const anoAgrupado = {};

    db.forEach(r => {

        tP += r.pass;
        tD += r.diar;
        tH += r.hosp;
        tO += r.alim;

        const tot =
            r.pass+r.diar+r.hosp+r.alim;

        anoAgrupado[r.ano] =
            (anoAgrupado[r.ano] || 0) + tot;
    });

    document.getElementById("dashKpiPass").innerText = fmt(tP);
    document.getElementById("dashKpiDiar").innerText = fmt(tD);
    document.getElementById("dashKpiOutros").innerText = fmt(tH+tO);
    document.getElementById("dashKpiTotal").innerText = fmt(tP+tD+tH+tO);

    const anos = Object.keys(anoAgrupado).sort();

    const valores = anos.map(a => anoAgrupado[a]);

    if(dashChartAnoInst) dashChartAnoInst.destroy();

    dashChartAnoInst = new Chart(
        document.getElementById('dashChartAno'),
        {
            type: 'line',

            data: {

                labels: anos,

                datasets: [{
                    label: 'Gastos Totais',

                    data: valores,

                    tension: 0.35,

                    fill: true
                }]
            },

            options: {
                maintainAspectRatio: false
            }
        }
    );

    if(dashChartCatInst) dashChartCatInst.destroy();

    dashChartCatInst = new Chart(
        document.getElementById('dashChartCat'),
        {
            type: 'doughnut',

            data: {

                labels: [
                    'Passagens',
                    'Diárias',
                    'Hospedagem',
                    'Outros'
                ],

                datasets: [{
                    data: [tP,tD,tH,tO]
                }]
            },

            options: {
                maintainAspectRatio: false
            }
        }
    );
}

// =========================================================
// 13. SIDEBAR
// =========================================================
function renderSidebar() {

    const container =
        document.getElementById("eventList");

    container.innerHTML = "";

    const anosMap = {};

    db.forEach(r => {

        if(!anosMap[r.ano]) {
            anosMap[r.ano] = new Set();
        }

        anosMap[r.ano].add(r.evento);
    });

    const anosOrd =
        Object.keys(anosMap)
        .sort((a,b)=>b-a);

    anosOrd.forEach(ano => {

        const group =
            document.createElement("div");

        group.className = "year-group";

        group.innerHTML = `
            <div class="year-label">
                EXERCÍCIO ${ano}
            </div>
        `;

        Array.from(anosMap[ano])
            .sort()
            .forEach(ev => {

                const item =
                    document.createElement("div");

                item.className = "event-item";

                item.innerText = ev;

                item.onclick = function() {

                    switchView(
                        'drilldown',
                        item
                    );

                    carregarDrilldown(
                        ano,
                        ev
                    );
                };

                group.appendChild(item);
            });

        container.appendChild(group);
    });
}

// =========================================================
// 14. SWITCH VIEW
// =========================================================
function switchView(viewId, element) {

    document
        .querySelectorAll('.view-section')
        .forEach(v => v.classList.remove('active'));

    document
        .querySelectorAll('.nav-item, .event-item, .sidebar-btn-main')
        .forEach(v => v.classList.remove('active'));

    document
        .getElementById('view-' + viewId)
        .classList.add('active');

    if(element) {
        element.classList.add('active');
    }

    document
        .getElementById('sidebar')
        .classList.remove('open');

    document
        .getElementById('sidebarOverlay')
        .classList.remove('open');
}

// =========================================================
// 15. LIMPAR FORM
// =========================================================
function limparForm() {

    document.getElementById("dataForm").reset();

    document.getElementById("regId").value = "";

    document.getElementById("formTitle").innerText =
        "Novo Lançamento";

    document.getElementById("regAno").value =
        new Date().getFullYear();
}

// =========================================================
// 16. INICIALIZAÇÃO
// =========================================================
window.onload = () => {

    document.getElementById('printDate').innerText =
        'Gerado em: ' +
        new Date().toLocaleString('pt-BR');

    sincronizarBD();

    switchView(
        'dashboard',
        document.getElementById('btn-dashboard')
    );

    setTimeout(() => {

        document
            .getElementById('loader')
            .classList.add('hidden');

    }, 1200);
};
</script>
