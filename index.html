<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema CN-SESI (Cloud Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --pbi-blue: #1F497D; --pbi-cyan: #0070C0; --pbi-bg: #f0f4f8; --card-shadow: 0 2px 8px rgba(0,0,0,0.07); --sidebar-width: 300px; --slate-800: #1e293b; --slate-600: #475569; --danger: #dc2626; --success: #059669; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'IBM Plex Sans', sans-serif; }
        body { background-color: var(--pbi-bg); color: var(--slate-800); display: flex; height: 100vh; overflow: hidden; }
        
        #loader { position: fixed; inset: 0; background: rgba(240,244,248,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; }
        #loader.hidden { display: none; }
        .spinner { border: 4px solid #dce4ef; border-top: 4px solid var(--pbi-cyan); border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .sidebar { width: var(--sidebar-width); background: #ffffff; border-right: 1px solid #dde3ec; display: flex; flex-direction: column; height: 100%; }
        .sidebar-header { padding: 22px; background: var(--pbi-blue); color: #fff; border-bottom: 3px solid var(--pbi-cyan); }
        .sidebar-btn-main { padding: 15px; cursor: pointer; font-weight: 700; color: var(--pbi-blue); border-bottom: 1px solid #eee; }
        .sidebar-btn-main.active { background: var(--pbi-blue); color: white; }
        .nav-item { padding: 15px; cursor: pointer; color: var(--slate-600); border-bottom: 1px solid #eee; }
        .nav-item.active { background: var(--pbi-blue); color: white; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .btn-sync { width: 90%; margin: 15px auto; padding: 10px; background: #e0f2fe; color: #0284c7; border: 1px dashed #0284c7; border-radius: 6px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .text-right { text-align: right; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p>Sincronizando com a Nuvem...</p></div>

    <div class="sidebar">
        <div class="sidebar-header"><h2>CN-SESI</h2><p>Cloud Edition</p></div>
        <button class="btn-sync" onclick="sincronizarBD()">🔄 Atualizar Nuvem</button>
        <div class="sidebar-btn-main" onclick="switchView('dashboard', this)">📊 Dashboard Geral</div>
        <div class="event-list-container" id="eventList" style="flex:1; overflow-y:auto;"></div>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="switchView('lancamentos', this)">✍️ Inserir / Editar</div>
            <div class="nav-item" onclick="switchView('ia', this)">🤖 Leitura Inteligente</div>
            <div class="nav-item" onclick="switchView('relatorios', this)">🖨️ Relatórios</div>
        </div>
    </div>

    <div class="main-content">
        <div id="view-dashboard" class="view-section active"><h1>Dashboard Geral</h1><canvas id="dashChartAno"></canvas></div>
        <div id="view-lancamentos" class="view-section">
            <form id="dataForm" onsubmit="salvarRegistro(event)">
                <input type="hidden" id="regId">
                <input type="number" id="regAno" placeholder="Ano" required>
                <input type="text" id="regEvento" placeholder="Evento" required>
                <input type="text" id="regConselheiro" placeholder="Conselheiro" required>
                <button type="submit">💾 Salvar na Nuvem</button>
            </form>
            <table id="tabelaCRUD"></table>
        </div>
        <div id="view-ia" class="view-section">
            <h3>Leitura Inteligente (Gemini IA)</h3>
            <textarea id="textoBruto" style="width:100%; height:200px; padding:10px;"></textarea>
            <button onclick="processarComIA()">Processar Documento</button>
        </div>
        <div id="view-relatorios" class="view-section">
            <button onclick="window.print()">🖨️ Imprimir Relatório</button>
            <table id="tabelaRelatorio"></table>
        </div>
    </div>

   <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwAckIZVCXCFiryql-BYu1xabX9zlXybIx6x59CGGmc9C4_zn8ouIjsIuIKK1aBGXOL-w/exec";
    const GEMINI_API_KEY = "AIzaSyBpd8uxPnEdjc1073sYHBDwlV8fW1HubME";
    let db = [];
    const fmt = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    async function sincronizarBD() {
        document.getElementById('loader').classList.remove('hidden');
        try {
            const res = await fetch(API_URL + "?action=ler");
            db = await res.json();
            renderizarUI();
        } catch(e) { alert("Erro ao carregar dados: " + e); }
        document.getElementById('loader').classList.add('hidden');
    }

    async function salvarRegistro(e) {
        e.preventDefault();
        const r = {
            id: document.getElementById("regId").value || "",
            ano: document.getElementById("regAno").value,
            evento: document.getElementById("regEvento").value,
            conselheiro: document.getElementById("regConselheiro").value,
            pass: 0, diar: 0, hosp: 0, alim: 0 // Simplificado para o seu form atual
        };
        await fetch(API_URL + `?action=salvar&dados=${encodeURIComponent(JSON.stringify(r))}`);
        alert("Salvo!");
        sincronizarBD();
    }

    async function processarComIA() {
        const texto = document.getElementById("textoBruto").value;
        const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: "Extraia os dados em JSON simples: " + texto }] }] })
        });
        const data = await res.json();
        alert("Processado! Verifique a planilha.");
        sincronizarBD();
    }

    function renderizarUI() {
        const tbody = document.getElementById("tabelaCRUD");
        tbody.innerHTML = "";
        db.forEach(r => {
            tbody.innerHTML += `<tr><td>${r.ano}</td><td>${r.evento}</td><td>${r.conselheiro}</td></tr>`;
        });
    }

    function switchView(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.sidebar-btn-main, .nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    window.onload = sincronizarBD;
</script>
</body>
</html>
